# Docker Compose for task-queue development

version: '3.8'

services:
  # Redis broker
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # RabbitMQ broker (alternative)
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PostgreSQL result backend
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: taskqueue
      POSTGRES_USER: taskqueue
      POSTGRES_PASSWORD: taskqueue
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskqueue"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Worker (Python)
  worker-python:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m taskqueue worker \
      --broker=redis://redis:6379/0 \
      --queues=default,high_priority \
      --concurrency=100
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TASKQUEUE_BROKER_URL=redis://redis:6379/0
      - TASKQUEUE_RESULT_BACKEND=redis://redis:6379/1
      - LOGLEVEL=INFO
    volumes:
      - ./python:/app
    deploy:
      replicas: 4
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m taskqueue scheduler \
      --broker=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - TASKQUEUE_BROKER_URL=redis://redis:6379/0
      - LOGLEVEL=INFO
    volumes:
      - ./python:/app
    restart: unless-stopped

  # REST API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m taskqueue api \
      --host=0.0.0.0 \
      --port=8000 \
      --broker=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - TASKQUEUE_BROKER_URL=redis://redis:6379/0
      - LOGLEVEL=INFO
    volumes:
      - ./python:/app
    restart: unless-stopped

  # Monitoring (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped

  # Monitoring (Grafana)
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    restart: unless-stopped

volumes:
  redis_data:
  rabbitmq_data:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: taskqueue-network
